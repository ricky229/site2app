name: Build APK

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Accept Android licenses
      run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

    - name: Install dependencies
      working-directory: ./backend
      run: npm install

    - name: Build APK and upload to Bubble
      working-directory: ./backend
      run: node scripts/github-build-bubble.js
      env:
        BUILD_ID: ${{ github.event.client_payload.buildId }}
        APP_NAME: ${{ github.event.client_payload.appName }}
        APP_URL: ${{ github.event.client_payload.url }}
        PACKAGE_NAME: ${{ github.event.client_payload.packageName }}
        THEME_COLOR: ${{ github.event.client_payload.themeColor }}
        SPLASH_BG_COLOR: ${{ github.event.client_payload.splashBgColor }}
        ORIENTATION: ${{ github.event.client_payload.orientation }}
        ENABLE_FULLSCREEN: ${{ github.event.client_payload.enableFullscreen }}
        PLATFORM: ${{ github.event.client_payload.platform }}
        VERSION_CODE: ${{ github.event.client_payload.versionCode }}
        VERSION_NAME: ${{ github.event.client_payload.versionName }}
        BUBBLE_API_URL: ${{ secrets.BUBBLE_API_URL }}
        BUBBLE_API_TOKEN: ${{ secrets.BUBBLE_API_TOKEN }}
