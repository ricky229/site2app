name: Push Notification Worker

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *' # S'exécute toutes les 5 minutes (limite GitHub Actions)
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./backend
        run: npm install firebase-admin

      - name: Run Push Worker
        working-directory: ./backend
        run: node scripts/push-worker.js
